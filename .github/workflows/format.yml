name: Format

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: format-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    format:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: ${{ github.head_ref || github.ref }}
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore RexGame.sln

            - name: Apply auto-fixes
              shell: bash
              run: |
                  set -euo pipefail
                  dotnet format Content.Shared/Content.Shared.csproj --no-restore
                  dotnet format Content.Client/Content.Client.csproj --no-restore
                  dotnet format Content.Server/Content.Server.csproj --no-restore

            - name: Commit and push when auto-fixes changed files on same-repo PRs or normal pushes
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              shell: bash
              env:
                  BRANCH: ${{ github.head_ref || github.ref_name }}
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -u
                  if git diff --cached --quiet; then
                    echo "No file changes from dotnet format."
                    exit 0
                  fi
                  git commit -m "Apply dotnet format"
                  git push origin "HEAD:${BRANCH}"

            - name: Verify no remaining fixable or manual issues
              shell: bash
              run: |
                  set -euo pipefail
                  dotnet format Content.Shared/Content.Shared.csproj --verify-no-changes --no-restore
                  dotnet format Content.Client/Content.Client.csproj --verify-no-changes --no-restore
                  dotnet format Content.Server/Content.Server.csproj --verify-no-changes --no-restore
