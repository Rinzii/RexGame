name: "Labels: Untriaged"

on:
    issues:
        types:
            - opened
    pull_request_target:
        types:
            - opened

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    add-untriaged:
        runs-on: ubuntu-latest

        steps:
            - name: Add Untriaged label when no labels exist
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const labels =
                        context.payload.issue?.labels ??
                        context.payload.pull_request?.labels ??
                        [];

                      if (labels.length !== 0) {
                        core.info('Issue or pull request already has labels');
                        return;
                      }

                      const issue_number =
                        context.payload.issue?.number ??
                        context.payload.pull_request?.number;

                      await github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number,
                        labels: ['S: Untriaged']
                      });
