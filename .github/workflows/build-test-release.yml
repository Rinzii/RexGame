name: Build & Test (Release)

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    DOTNET_NO_LOGO: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    REXGAME_MACOS_APP_NAME: RexGame
    REXGAME_MACOS_BUNDLE_ID: com.rexengine.rexgame
    REXGAME_UPLOAD_MACOS_ARTIFACTS: false

jobs:
    build:
        name: Release (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]

        runs-on: ${{ matrix.os }}
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x
                  cache: true
                  cache-dependency-path: |
                      **/*.csproj
                      **/Directory.Build.props
                      **/Directory.Packages.props
                      **/packages.lock.json

            - name: Restore
              run: dotnet restore RexGame.sln

            - name: Build
              run: >
                  dotnet build RexGame.sln
                  --configuration Release
                  --no-restore
                  -warnaserror
                  /p:ContinuousIntegrationBuild=true

            - name: Build macOS client app bundles
              if: matrix.os == 'macos-latest'
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p release
                  for rid in osx-x64 osx-arm64; do
                    dotnet publish Content.Client/Content.Client.csproj \
                      --configuration Release \
                      --runtime "$rid" \
                      --no-self-contained \
                      /p:UseAppHost=true \
                      /p:ContinuousIntegrationBuild=true

                    bundle_root="release/${rid}"
                    rm -rf "$bundle_root"
                    mkdir -p "$bundle_root"

                    python3 Tools/macos_make_appbundle.py \
                      --directory "build/publish/Content.Client/release_${rid}" \
                      --output-dir "$bundle_root" \
                      --name "$REXGAME_MACOS_APP_NAME" \
                      --apphost Content.Client \
                      --identifier "$REXGAME_MACOS_BUNDLE_ID"

                    if [ "$REXGAME_UPLOAD_MACOS_ARTIFACTS" = "true" ]; then
                      ditto -c -k --sequesterRsrc --keepParent \
                        "$bundle_root/${REXGAME_MACOS_APP_NAME}.app" \
                        "release/${REXGAME_MACOS_APP_NAME}-${rid}.zip"
                    fi
                  done

            - name: Test
              shell: bash
              run: |
                  set -euo pipefail
                  if git ls-files '*Tests.csproj' '*Tests.fsproj' | grep -q .; then
                    dotnet test RexGame.sln \
                      --configuration Release \
                      --no-build \
                      --verbosity minimal \
                      --results-directory TestResults \
                      --logger "trx;LogFileName=test-results.trx" \
                      --blame-hang --blame-hang-timeout 5m
                  else
                    echo "No test projects found in RexGame yet."
                  fi

            - name: Upload macOS app bundles
              if: matrix.os == 'macos-latest' && env.REXGAME_UPLOAD_MACOS_ARTIFACTS == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: macos-client-bundles
                  path: release/*.zip
                  if-no-files-found: error
