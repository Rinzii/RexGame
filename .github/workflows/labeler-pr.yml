name: "Labels: PR"

on:
    pull_request_target:

permissions:
    contents: read
    pull-requests: write

jobs:
    labeler:
        runs-on: ubuntu-latest

        steps:
            - name: Apply path-based labels
              uses: actions/labeler@v5
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  configuration-path: .github/labeler.yml
