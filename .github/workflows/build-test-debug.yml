name: Build & Test (Debug)

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    DOTNET_NO_LOGO: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
    build:
        name: Build (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]

        runs-on: ${{ matrix.os }}
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x
                  cache: true
                  cache-dependency-path: |
                      **/*.csproj
                      **/Directory.Build.props
                      **/Directory.Packages.props
                      **/packages.lock.json

            - name: Restore
              run: dotnet restore RexGame.sln

            - name: Build
              run: >
                  dotnet build RexGame.sln
                  --configuration Debug
                  --no-restore
                  -warnaserror
                  /p:ContinuousIntegrationBuild=true

            - name: Test
              shell: bash
              run: |
                  set -euo pipefail
                  if git ls-files '*Tests.csproj' '*Tests.fsproj' | grep -q .; then
                    dotnet test RexGame.sln \
                      --configuration Debug \
                      --no-build \
                      --verbosity minimal \
                      --results-directory TestResults \
                      --logger "trx;LogFileName=test-results.trx" \
                      --blame-hang --blame-hang-timeout 5m
                  else
                    echo "No test projects found in RexGame yet."
                  fi

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results-${{ matrix.os }}
                  path: TestResults
                  if-no-files-found: ignore
